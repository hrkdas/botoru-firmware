name: Update stable manifest

on:
  release:
    types:
      - published

permissions:
  contents: write

concurrency:
  group: update-stable-manifest-${{ github.event.release.id }}
  cancel-in-progress: false

jobs:
  update-stable-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Generate manifest from published release asset
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import sys
          import urllib.request

          event_path = os.environ['GITHUB_EVENT_PATH']
          with open(event_path, 'r', encoding='utf-8') as fh:
              event = json.load(fh)

          release = event.get('release') or {}
          tag = release.get('tag_name', '').strip()
          assets = release.get('assets') or []
          repo_full_name = os.environ['GITHUB_REPOSITORY']

          if not tag:
              raise SystemExit('Release tag is missing in event payload')

          version = tag[1:] if tag.startswith('v') else tag
          expected_names = [f'firmware_v{version}.bin', f'firmware_{version}.bin']
          print(f'Detected tag: {tag}')
          print(f'Derived version: {version}')
          print(f'Expected asset names: {expected_names}')

          selected = None
          exact_matches = [a for a in assets if a.get('name') in expected_names]
          if exact_matches:
              selected = exact_matches[0]
          else:
              bin_assets = [a for a in assets if str(a.get('name', '')).endswith('.bin')]
              if len(bin_assets) == 1:
                  selected = bin_assets[0]
              elif len(bin_assets) == 0:
                  raise SystemExit('No .bin asset found on the published release')
              else:
                  names = ', '.join(str(a.get('name')) for a in bin_assets)
                  raise SystemExit(f'Ambiguous .bin assets on release: {names}')

          asset_name = str(selected.get('name', '')).strip()
          asset_url = str(selected.get('browser_download_url', '')).strip()
          if not asset_name or not asset_url:
              raise SystemExit('Selected release asset is missing name or browser_download_url')

          print(f'Selected asset: {asset_name}')
          print(f'Asset download URL: {asset_url}')

          download_path = pathlib.Path('release_asset.bin')
          req = urllib.request.Request(asset_url)
          req.add_header('Accept', 'application/octet-stream')
          req.add_header('Authorization', f"Bearer {os.environ['GITHUB_TOKEN']}")
          req.add_header('X-GitHub-Api-Version', '2022-11-28')
          with urllib.request.urlopen(req, timeout=120) as response:
              data = response.read()

          if not data:
              raise SystemExit('Downloaded release asset is empty')

          download_path.write_bytes(data)
          print(f'Downloaded asset path: {download_path.resolve()}')

          sha256 = hashlib.sha256(data).hexdigest()
          size = len(data)
          print(f'Computed sha256: {sha256}')
          print(f'Computed size: {size}')

          manifest = {
              'channel': 'stable',
              'version': version,
              'firmware_url': f'https://github.com/{repo_full_name}/releases/download/{tag}/{asset_name}',
              'sha256': sha256,
              'size': size,
              'changelog': f'Auto-generated from release {tag}',
              'force': False,
          }

          manifest_dir = pathlib.Path('manifest')
          manifest_dir.mkdir(parents=True, exist_ok=True)
          manifest_path = manifest_dir / 'stable.json'
          manifest_path.write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          print(f'Manifest updated: {manifest_path}')
          PY

      - name: Commit manifest if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- manifest/stable.json; then
            echo "No manifest changes detected"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest/stable.json
          git commit -m "chore: update stable manifest for ${GITHUB_REF_NAME}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
